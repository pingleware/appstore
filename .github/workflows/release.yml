name: Build and Publish Electron App

on:
  push:
    tags:
      - 'v*'   # triggers on version tags like v1.0.0-optiquest

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            npx electron-builder --win --publish always
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            npx electron-builder --mac --publish always
          else
            npx electron-builder --linux --publish always
          fi

  release-notes:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate release notes from commit messages
        id: notes
        run: |
          echo "## Changes since last release" > optiquest_release_notes.md
          git fetch --tags
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^)
          git log --pretty=format:"- %s" ${PREV_TAG}..HEAD >> optiquest_release_notes.md

      - name: Update GitHub Release with notes
        uses: softprops/action-gh-release@v1
        with:
          draft: false # set to true for draft, false to publish
          tag_name: ${{ github.ref_name }}
          body_path: optiquest_release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}